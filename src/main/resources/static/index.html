<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HERO -->
    <div class="hero">
        <h1>Employee Management System</h1>
        <p>Built with Spring Boot · MySQL · REST API · Vanilla JS</p>
        <div class="badges">
            <span class="badge">☕ Java 21</span>
            <span class="badge">🌱 Spring Boot 4.1</span>
            <span class="badge">🗄️ MySQL</span>
            <span class="badge">🔗 REST API</span>
            <span class="badge">✅ JPA & Hibernate</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <!-- ADD FORM -->
        <div class="card">
            <h2>Add Employee</h2>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Enter first name">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Enter last name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="department" placeholder="Enter department">
            </div>
            <button class="btn-add" onclick="addEmployee()">Add Employee</button>
            <div class="message" id="message"></div>
        </div>

        <!-- EMPLOYEE TABLE -->
        <div class="table-card">
            <div class="table-header">
                <h2>All Employees</h2>
                <span class="employee-count" id="empCount">0 employees</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="employeeTable">
                    <tr>
                        <td colspan="6" class="empty-state">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
